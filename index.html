<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pizza-Regelung 15 min Simulation</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

canvas {
    background: white;
    border: 1px solid #ccc;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
}

#status {
    font-size: 20px;
    margin-top: 10px;
}

#result {
    font-size: 30px;
    font-weight: bold;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>🍕 Pizza-Regelungssimulation (15 min)</h2>

<button onclick="toggle()">Ofen AN/AUS</button>

<div id="status">Status: läuft...</div>

<div id="result"></div>

<canvas id="chart" width="800" height="350"></canvas>

<script>

let oven = false;

let temp = 20;
const ambient = 20;

// 🎯 Sollbereich
const target = 190;
const band = 3;

// ⏱ Simulation
let time = 0;
const maxTime = 15 * 60; // 15 min in "Sekunden"

let dataTemp = [];
let dataTarget = [];

let finished = false;

function toggle(){
    if(!finished) oven = !oven;
}

// 🍕 Bewertung
function evaluate(){
    let insideBandTime = 0;
    let below = 0;
    let above = 0;

    for(let i=0;i<dataTemp.length;i++){
        if(dataTemp[i] >= target-band && dataTemp[i] <= target+band){
            insideBandTime++;
        }
        if(dataTemp[i] < target-band){
            below++;
        }
        if(dataTemp[i] > target+band){
            above++;
        }
    }

    let ratioInside = insideBandTime / dataTemp.length;

    // Regeln nach deiner Vorgabe:
    if(ratioInside > 0.6 && above < below){
        return "TOP";
    }
    if(above > below){
        return "VERBRANNT";
    }
    return "TIEFGEFROREN";
}

// 🧠 Physik
function update(){
    if(finished) return;

    let power = oven ? 7.5 : 0.0;
    let loss = 0.02 * (temp - ambient);

    temp += power - loss;

    if(temp < ambient) temp = ambient;
    if(temp > 350) temp = 350;

    dataTemp.push(temp);
    dataTarget.push(target);

    time++;

    if(time >= maxTime){
        finished = true;
        showResult();
    }
}

function showResult(){
    let result = evaluate();

    let img = "";

    if(result === "TOP"){
        img = "🍕 TOP PIZZA";
    } else if(result === "VERBRANNT"){
        img = "🔥 VERBRANNT";
    } else {
        img = "🧊 TIEFGEFROREN";
    }

    document.getElementById("result").innerText = img;
}

function draw(){
    const c = document.getElementById("chart");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    // Achsen
    ctx.beginPath();
    ctx.moveTo(50,300);
    ctx.lineTo(750,300);
    ctx.moveTo(50,300);
    ctx.lineTo(50,20);
    ctx.stroke();

    let sx = 2.5;
    let sy = 1.2;

    // Soll
    ctx.beginPath();
    ctx.strokeStyle = "red";
    for(let i=0;i<dataTarget.length;i++){
        let x = 50 + i*sx;
        let y = 300 - dataTarget[i]*sy;
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();

    // Ist
    ctx.beginPath();
    ctx.strokeStyle = "blue";
    for(let i=0;i<dataTemp.length;i++){
        let x = 50 + i*sx;
        let y = 300 - dataTemp[i]*sy;
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();

    ctx.fillStyle="black";
    ctx.fillText("Zeit →",700,330);
    ctx.fillText("Temperatur",10,30);
}

// ⏱ Loop (1 Iteration = 1 Sekunde simuliert)
function loop(){
    update();
    draw();

    document.getElementById("status").innerText =
        "Zeit: " + Math.floor(time/60) + " min";

    setTimeout(loop, 50); // schnellere Simulation
}

loop();

</script>

</body>
</html>
